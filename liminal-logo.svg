<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#06060a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Outer scan ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.35"/>

  <!-- Door frame outline -->
  <rect x="168" y="110" width="176" height="292" rx="6" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.7"/>

  <!-- Door panel — left half (slightly different) -->
  <rect x="172" y="114" width="84" height="284" rx="4" fill="#c9a84c" opacity="0.04"/>
  <!-- Door panel — right half -->
  <rect x="256" y="114" width="84" height="284" rx="4" fill="#c9a84c" opacity="0.07"/>

  <!-- Center seam — the "tell" -->
  <line x1="256" y1="114" x2="256" y2="398" stroke="#c9a84c" stroke-width="2" opacity="0.9"/>
  <!-- Seam glow -->
  <line x1="256" y1="114" x2="256" y2="398" stroke="#c9a84c" stroke-width="10" opacity="0.12" filter="url(#blur)"/>

  <!-- Detection ring at handle height -->
  <circle cx="286" cy="256" r="12" fill="none" stroke="#c94c4c" stroke-width="2" opacity="0.85"/>
  <circle cx="286" cy="256" r="4" fill="#c94c4c" opacity="0.9"/>
  <!-- Crosshair -->
  <line x1="270" y1="256" x2="278" y2="256" stroke="#c94c4c" stroke-width="1.5" opacity="0.7"/>
  <line x1="294" y1="256" x2="302" y2="256" stroke="#c94c4c" stroke-width="1.5" opacity="0.7"/>
  <line x1="286" y1="240" x2="286" y2="248" stroke="#c94c4c" stroke-width="1.5" opacity="0.7"/>
  <line x1="286" y1="264" x2="286" y2="272" stroke="#c94c4c" stroke-width="1.5" opacity="0.7"/>

  <!-- Floor line -->
  <line x1="140" y1="398" x2="372" y2="398" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.5"/>

  <!-- Corner scan brackets -->
  <path d="M140 130 L140 110 L168 110" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M372 130 L372 110 L344 110" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M140 382 L140 402 L168 402" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M372 382 L372 402 L344 402" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Scan line sweep -->
  <rect x="168" y="230" width="176" height="1.5" fill="#c9a84c" opacity="0.4"/>
  <rect x="168" y="228" width="176" height="6" fill="url(#glow)" opacity="0.6"/>

  <!-- LIMINAL wordmark -->
  <text x="256" y="458" font-family="serif" font-size="32" font-weight="700" fill="#e8d5a0" text-anchor="middle" letter-spacing="10" opacity="0.9">LIMINAL</text>

  <!-- System label -->
  <text x="256" y="478" font-family="monospace" font-size="10" fill="#c9a84c" text-anchor="middle" letter-spacing="4" opacity="0.5">DETECTION SYSTEM</text>
</svg>
